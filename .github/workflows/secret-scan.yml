# Secret-scan CI workflow (GitHub Actions) — gitleaks, pinned.
#
# Secret-scanning standard = gitleaks. This is the drop-in CI backstop for the same
# guard that runs as a git pre-commit hook locally (see ../../git-hooks/no-secrets-scan
# and the `secret-scanning` skill). The git-hook catches it on the committer's machine;
# CI catches anyone whose local hook is missing or bypassed.
#
# INSTALL: copy this file to .github/workflows/secret-scan.yml in your repo.
#
# TIERS: this workflow is the BLOCK tier — a high-confidence finding FAILS the job.
# The warn tier is a local-hook nicety; in CI, "fail on any high-confidence secret" is
# the right default (a warn-only CI check is ignored and worthless). If you want CI to
# surface low-confidence findings without failing, run a second non-required job with
# GITLEAKS_CONFIG pointed at gitleaks-warn.toml and `continue-on-error: true`.
#
# EXTEND / ALLOWLIST: gitleaks reads `.gitleaks.toml` at the repo root automatically.
# Add custom [[rules]] and an [allowlist] there. For an org-wide baseline, point
# GITLEAKS_CONFIG at a checked-in shared config. False positives: inline `gitleaks:allow`
# comment, or an [allowlist] entry. See the `secret-scanning` skill for the full story.
#
# PINNED: gitleaks/gitleaks-action is pinned to a commit SHA (supply-chain hygiene —
# a moving tag like @v3 can be repointed at malicious code). Bump deliberately.

name: secret-scan

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (block on secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — gitleaks scans commits, not just the tree)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Optional: a checked-in org/repo config. Defaults to repo-root .gitleaks.toml.
          # GITLEAKS_CONFIG: .gitleaks.toml
          #
          # GITLEAKS_LICENSE is only required for gitleaks-action in GitHub *organizations*
          # (not personal repos). Set it as a repo/org secret if your account needs it:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
