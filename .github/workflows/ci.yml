name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: pip install -e '.[test]' pyyaml
      - name: Unit suite
        run: python -m pytest -q
      # The smoke script self-skips the apply leg when no agent-tools checkout is present
      # (CI has none), so it exercises --help / doctor / export / pytest end to end here.
      - name: Smoke
        run: bash tests/smoke.sh

  secret-scan:
    # Mirrors the agent-tools secret-scan gate (gitleaks, pinned). Block tier: a
    # high-confidence finding fails the job.
    name: gitleaks (block on secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history — gitleaks scans commits, not just the tree)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
