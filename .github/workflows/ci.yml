name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # tmux is REQUIRED for the hermetic unit suite, not optional: the socket-leak regression and
      # the DEFECT-5 boot-cleanup test are gated `@_requires_tmux` (tmux-present, NO network), so a
      # runner WITHOUT tmux silently SKIPS them — the leak that killed the dev's server would then
      # go unguarded in CI (INCIDENT 2026-06-17 follow-up a). `ubuntu-latest` ships no tmux, so we
      # install it here. `test_tmux_e2e_gating.py` asserts tmux is on PATH, so a future image that
      # drops this step fails LOUDLY instead of reverting to a silent skip.
      - name: Install tmux (the @_requires_tmux unit tests must RUN, not skip)
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install package + test deps
        run: pip install -e '.[test]' pyyaml
      - name: Unit suite
        run: python -m pytest -q
      # The smoke script self-skips the apply leg when no agent-tools checkout is present
      # (CI has none), so it exercises --help / doctor / export / pytest end to end here.
      # The full run already covers every leg the --fast subset runs (--fast only GATES OFF the
      # heavy apply/pytest), so there's no separate --fast CI step — the fast-mode plumbing
      # (arg-parse, self-skip, banners) is covered hermetically by tests/test_smoke_precommit.py.
      - name: Smoke
        run: bash tests/smoke.sh

  # The REAL tmux reboot-cycle e2e (apply → execute the boot script → assert a server comes up
  # with config + a session; a fake claude child → non-empty cc-map; a real resurrect snapshot;
  # old-boot cleanup). Opt-in (RIG_TMUX_E2E=1) + network (clones the real plugins), so it lives in
  # its OWN job — the hermetic `pytest -q` above stays offline-safe. Auto-skips if tmux/git/network
  # is unavailable (never a false block); proves the reboot fix on every PR when they ARE present.
  tmux-e2e:
    name: tmux reboot-cycle e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install package + test deps
        run: pip install -e '.[test]' pyyaml
      - name: Real tmux e2e (opt-in)
        env:
          RIG_TMUX_E2E: "1"
        run: python -m pytest tests/test_tmux_e2e.py -q -rs

  # The clean-room / Docker e2e: `rig init` as a BRAND-NEW user on a pristine machine (a fresh
  # python:3.x-slim container, a non-root user with an empty HOME, a self-contained fake
  # agent-tools checkout). Asserts the four ROADMAP acceptance points — skills harness-discoverable
  # (~/.claude/skills symlinks resolve), hooks/dispatcher/CI/auto-mode + the CC hook-bridge
  # installed, idempotent re-apply, `rig status` clean — against the REAL CLI. The container RUN is
  # fully OFFLINE (`docker run --network none`); the one-time image BUILD still needs apt/PyPI
  # egress. Opt-in (RIG_CLEANROOM_E2E=1) + auto-skips when Docker is absent, so the hermetic
  # `pytest -q` above never depends on a container runtime. ubuntu-latest ships Docker, so this
  # runs (not skips) on every PR.
  cleanroom-e2e:
    name: clean-room (Docker) e2e
    runs-on: ubuntu-latest
    # cap the job so a hung pip/registry step can't hold a runner for the 360-min GHA default.
    # The test's own build(900s)+run(600s) timeouts total ~25m and fail with a labeled message;
    # this outer cap (45m) leaves real slack for checkout/setup/pip so the GHA hard kill (no
    # diagnostic) is the last resort, not the first.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # best-effort warm-up of the base image; `docker build` pulls it anyway, so a transient
      # registry hiccup here must not take the whole job down — but surface it as a warning so a
      # persistent auth/quota problem isn't silently swallowed.
      - name: Pre-pull the clean-room base image
        run: docker pull python:3.12-slim || echo "::warning::base-image pre-pull failed; build will retry the pull"
      # host-side needs pytest (the e2e shells out to docker) AND pyyaml — the hermetic helper
      # test validates the clean-room rig.yaml string with `yaml.safe_load`. Both come from
      # `.[test]`: pytest via the extra, pyyaml as rig's own runtime dependency. The CONTAINER
      # does its own `pip install /opt/rig-cli` independently.
      - name: Install test deps
        run: pip install -e '.[test]'
      - name: Clean-room Docker e2e (opt-in)
        env:
          RIG_CLEANROOM_E2E: "1"
        run: python -m pytest tests/test_cleanroom_e2e.py -q -rs

  # The REAL-catalog smoke: check out the actual agent-tools repo and run rig's smoke against
  # THAT catalog (not the synthetic in-repo fixtures the unit suite uses). rig + agent-tools
  # co-evolve; a rig change that breaks against the real catalog layout (a NEW slot type, a
  # renamed dir, a catalog item rig can't resolve) is unit-GREEN but live-BROKEN — this exact
  # class ("unknown ci item: pr-checklist") has bitten before. The smoke's full-coverage leg
  # discovers + dry-run-plans EVERY catalog item and asserts zero unknown-item/slot errors.
  # The plain `test`/`smoke` job above carries no agent-tools checkout, so it self-skips these
  # legs; this job supplies one.
  #
  # `smoke.sh --fast`, NOT the full run: --fast runs the full-coverage drift guard (a `rig apply
  # --dry-run` that writes nothing) + the real-catalog `rig status` legs, and SKIPS the heavy
  # `rig init --yes` apply. So the catalog is only PLANNED here, never applied — nothing on the
  # runner is mutated and no catalog hook/script is executed. The heavy first-run apply is
  # already covered against a self-contained fake catalog by `cleanroom-e2e`.
  #
  # The catalog is checked out at the DEFAULT branch HEAD (not a pinned SHA) ON PURPOSE: this is
  # a co-evolution drift guard — it must catch a rig↔catalog mismatch against the CURRENT catalog,
  # so pinning would freeze exactly the thing it watches.
  #
  # RESILIENT: the agent-tools checkout is best-effort (`continue-on-error`). If the repo is
  # unreachable (renamed / made private / a fork without access), the job SKIPS the smoke
  # LOUDLY (a `::warning::` + a visible "skip" line) instead of hard-failing CI on infra it
  # doesn't own. When the catalog IS fetched (the normal case — agent-tools is public), the
  # smoke runs for real and a real catalog/rig drift fails the job.
  real-catalog-smoke:
    name: real-catalog smoke (against agent-tools)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout rig-cli
        uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (rig parses YAML at runtime → pyyaml comes via .[test])
        run: pip install -e '.[test]'
      # Fetch the REAL agent-tools catalog into a sibling path. Best-effort: a checkout failure
      # (private/renamed/unreachable) must SKIP the smoke loudly, not hard-fail this job.
      - name: Checkout the real agent-tools catalog
        id: catalog
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: alex-mextner/agent-tools
          path: agent-tools-catalog
          # a shallow checkout is enough — the smoke reads the working tree, not history.
          fetch-depth: 1
      - name: Real-catalog smoke --fast (skips LOUDLY if the catalog could not be fetched)
        run: |
          set -euo pipefail
          SRC="$GITHUB_WORKSPACE/agent-tools-catalog"
          # Guard the ci/ dir too: the full-coverage leg's slot loop is over $SRC/ci, so a
          # renamed/missing ci/ must SKIP loudly here, not pass with vacuous coverage. (The leg
          # itself also fails on zero slots, but skipping loudly is the right CI signal when the
          # whole catalog couldn't be fetched.)
          if [[ "${{ steps.catalog.outcome }}" != "success" \
                || ! -d "$SRC/skills" || ! -d "$SRC/agent-hooks" || ! -d "$SRC/ci" ]]; then
            echo "::warning title=real-catalog smoke skipped::could not fetch a complete agent-tools catalog (outcome=${{ steps.catalog.outcome }}); the rig<->catalog drift guard did NOT run"
            echo "skip real-catalog smoke — agent-tools catalog unavailable/incomplete (see warning above)"
            exit 0
          fi
          echo "agent-tools catalog at $SRC — running rig smoke --fast against the REAL catalog"
          RIG_AGENT_TOOLS_SOURCE="$SRC" bash tests/smoke.sh --fast
      # The real-catalog PYTEST guards (the `test_real_catalog_*` family + the require-ticket
      # provisioning test, agent-tools#92) self-SKIP without an agent-tools checkout — and the
      # `test` job above has none, while `smoke.sh --fast` SKIPS the pytest leg entirely. So those
      # regression guards ran in NO CI job: a regression (rig stops provisioning require-ticket,
      # or the agent_hooks default flips to opt-in) was unit-GREEN and shipped unguarded. This step
      # supplies the env both gates need — RIG_AGENT_TOOLS_SOURCE (resolves the catalog so the
      # Catalog.scan / _agent_tools_source skips DON'T fire) AND RIG_SMOKE_FAST_E2E=1 (lifts the
      # opt-in `skipif` on the two smoke-e2e legs) — so the guards actually RUN here and gate.
      - name: Real-catalog pytest guards (must RUN, not skip — the regression gate)
        run: |
          set -euo pipefail
          SRC="$GITHUB_WORKSPACE/agent-tools-catalog"
          if [[ "${{ steps.catalog.outcome }}" != "success" \
                || ! -d "$SRC/skills" || ! -d "$SRC/agent-hooks" || ! -d "$SRC/ci" ]]; then
            echo "::warning title=real-catalog pytest guards skipped::could not fetch a complete agent-tools catalog (outcome=${{ steps.catalog.outcome }}); the real-catalog regression guards did NOT run"
            echo "skip real-catalog pytest guards — agent-tools catalog unavailable/incomplete"
            exit 0
          fi
          echo "running the real-catalog pytest guards against $SRC"
          # Capture pytest's exit code SEPARATELY (set +e around it): a real regression makes a
          # guard FAIL (exit 1) and an empty selection exits 5 — under `set -e` either would abort
          # the step before the labeled guards below could explain WHY. `-v` prints each selected
          # test's PASS/SKIP per line (so the log PROVES the guards RAN); `-rN` resets the summary
          # reason list to keep that tail clean.
          set +e
          out="$(RIG_AGENT_TOOLS_SOURCE="$SRC" RIG_SMOKE_FAST_E2E=1 \
                 python -m pytest tests/ -k real_catalog -rN -v 2>&1)"
          rc=$?
          set -e
          echo "$out"
          # ── guard order matters: diagnose a REAL failure first, vacuous-pass last ──
          # 1) A real regression (a guard FAILED) → pytest exit 1. Check this BEFORE the skip/empty
          #    branches so a mixed "1 failed, 1 skipped" run is reported as FAILED (the true cause),
          #    not mislabeled "skipped/theater". `python -m pytest` not on PATH would also land here
          #    (rc!=0,5) — but the job's `pip install -e '.[test]'` step pulls pytest in, so a
          #    missing-pytest rc=1 means a genuinely broken job, which SHOULD fail loudly.
          if [[ "$rc" -ne 0 && "$rc" -ne 5 ]]; then
            echo "::error title=real-catalog guard FAILED::a real-catalog regression guard failed (pytest exit $rc) — that is the gate doing its job"
            exit "$rc"
          fi
          # 2) Empty selection: pytest exits 5 ("no tests ran") and prints "N deselected" with no
          #    "selected" — a renamed test the -k expression no longer matches lands here.
          if [[ "$rc" -eq 5 ]] || grep -Eq "no tests ran" <<<"$out"; then
            echo "::error title=real-catalog guards collected nothing::the -k real_catalog selector matched 0 tests (a rename broke the gate)"
            exit 1
          fi
          # 3) Any SKIP with the catalog present means a gate that should have run didn't — env
          #    wiring broke and the gate is theater again. (rc==0 here, so no real failure is hidden.)
          if grep -Eq "[1-9][0-9]* skipped" <<<"$out"; then
            echo "::error title=real-catalog guards SKIPPED::a real-catalog guard skipped despite the catalog being present — the env wiring is broken and the gate is theater"
            exit 1
          fi
          # 4) Pin the #72 require-ticket provisioning guard EXPLICITLY by node-id: it's the most
          #    important guard (rig must provision require-ticket into every repo, agent-tools#92).
          #    If a future rename drops `real_catalog` from ITS name, the rest of the family would
          #    still pass green and silently un-gate exactly this test — so assert it ran + passed
          #    by name, not just "the family is green".
          grep -Eq "test_real_catalog_provisions_require_ticket_guard (PASSED|::.*PASSED)" <<<"$out" \
            || { echo "::error title=require-ticket guard not in the run::the #72 require-ticket provisioning test did not appear as PASSED — it was renamed out of the -k set or did not run"; exit 1; }
          grep -Eq "[1-9][0-9]* passed" <<<"$out" \
            || { echo "::error title=no real-catalog guard passed::expected >=1 passing real-catalog test"; exit 1; }
          echo "real-catalog pytest guards RAN and passed (none skipped; require-ticket guard pinned)"

  secret-scan:
    # Mirrors the agent-tools secret-scan gate (gitleaks, pinned). Block tier: a
    # high-confidence finding fails the job.
    name: gitleaks (block on secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history — gitleaks scans commits, not just the tree)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
