# yaml-language-server: $schema=schema/rig.schema.json
# rig.yaml — rig-cli dogfoods its own config.
# COMMITTED BY DEFAULT: this file is the reproducible source of truth for this repo.
# Global defaults live at ~/.config/rig/config.yaml; this file overrides them.
# agent_tools_source is intentionally omitted → auto-detected (RIG_AGENT_TOOLS_SOURCE,
# then ~/xp/agent-tools / ~/work/agent-tools / ~/agent-tools) so the file stays portable.
# Apply with: rig apply   ·   Check drift with: rig status   ·   Schema: docs/config-schema.md
# Machine-readable schema (editor completion/validation): schema/rig.schema.json

version: 1

defaults:
  skills_target: ~/.agents/skills
  hooks_target: ~/.claude/hooks
  ci_target: .github/workflows
  mcp_target: ~/.claude/mcp
  on_conflict: backup

# ── Skills — all universal + the cli by-type bundle (this is a Python CLI) ────────
# harness_link defaults to true: each installed skill is also symlinked into the harness
# discovery dir (~/.claude/skills) so the agent harness actually lists/loads it.
skills:
  enabled: true
  target: ~/.agents/skills
  universal:
    all: true
    disable: []
  by_type:
    enable: [cli]

# ── Agent-hooks — the full discipline+security set ───────────────────────────────
agent_hooks:
  enabled: true
  target: ~/.claude/hooks
  target_kind: claude-code
  all: true

# ── Git-hooks — the global dispatcher (secret-scan runs in every repo) ────────────
git_hooks:
  dispatcher:
    enabled: true
    dir: ~/.config/git/global-hooks.d
    runner: ~/.config/git/run-global-hooks
    set_global_hooks_path: true
    install_local_retrofit_script: true
    fragments:
      secret-scan: { enabled: true }

# ── CI gates — security baseline + ship (no UI → no screenshots gate) ─────────────
ci:
  enabled: true
  target: .github/workflows
  all: false
  items:
    secret-scan:       { enabled: true,  tier: block }
    dependency-review: { enabled: true,  tier: block }
    leftover-grep:     { enabled: true,  tier: block }
    review-threads:    { enabled: true,  tier: block }
    pr-title-lint:     { enabled: true,  tier: warn }
    ship:
      enabled: true
      install_to: ~/bin
      gh_alias: true

# ── MCP — adapters for systems the agent can't reach from a shell ─────────────────
# No item is declared by default: the agent-tools MCP catalog ships no concrete server, and
# `review` is a CLI + skill, NOT an MCP — its dead MCP slot was removed in agent-tools #32.
# Add a real server under `items:` only when one exists in the catalog (e.g.
# a code-search server like serena/sverklo — see docs/config-schema.md and mcp/README.md).
mcp:
  enabled: true
  target: ~/.claude/mcp
  items: {}

# ── Permissions — allowlist + deny/ask baselines in the harness settings (rig-cli#100) ─────
# Default **ON**: an ABSENT `permissions:` block still provisions the allowlist with the default
# tool set, so rig pre-allows tg/review/draw/3d/rig/task/dev + gh/git/rg/uv/bun/jq/gitleaks in the
# harness's permission allowlist (claude-code: permissions.allow in ~/.claude/settings.json;
# opencode: permission.bash) — AND, for claude-code, asserts the conservative deny/ask rule
# baselines (raw `gh pr merge`, force pushes, sudo rm, screencapture denied; pkill/killall/
# `git reset --hard` prompt) — the OUTER belt the harness evaluates before hooks. The merge is
# ADDITIVE — every existing entry is preserved, the desired ones are merged in, deduped; a
# re-apply is a no-op; extras are reported as drift, never deleted. The allow grant is at the
# command-PREFIX level (Bash(<tool>:*) covers a tool's subcommands/flags), so the restraint is in
# WHICH tools are listed — dev/VCS tooling, never standalone destructive commands (rm/sudo/dd).
# GLOBAL-only (the settings file is per-machine), like
# tg_ctl/gitignore — so it is NOT scaffolded into this committed repo rig.yaml; declare it in the
# global config (~/.config/rig/config.yaml) to override the lists. Config-driven:
#   permissions:
#     enabled: true
#     kind: opencode        # target opencode's allowlist (default: follow harness.kind / claude-code)
#     tools: [tg, review, draw, 3d, rig, task, dev, gh, git, rg, uv, bun, jq, gitleaks]  # REPLACES default
#     extra: [kubectl]      # ADDS to the (default or explicit) set
#     disable: [gitleaks]   # drops from rig's desired set (won't ADD it; never removes a live entry)
#     allow: [WebFetch]     # RAW rule entries asserted in the allow list (adopt a hand-grown allowlist)
#     deny: []              # REPLACES the baked deny baseline ([] disables; absent → baseline)
#     ask: []               # REPLACES the baked ask baseline ([] disables; absent → baseline)
# Keyed off permissions.kind, else harness.kind (codex/gemini have no additively-mergeable
# allowlist → recorded N/A; opencode's rule dialect is unverified → raw allow/deny/ask entries
# are dropped with a plan note; its tool-derived allowlist still works).

# ── Harness — recommend auto-mode ON by default ───────────────────────────────────
# The agent runs autonomously (the harness auto-accepts tool calls) with minimum
# babysitting. SAFE because the agent-hooks above are installed (all: true) — they block
# secret writes, --no-verify bypasses, un-timed shell, raw process.env, and a raw
# `gh pr merge` that skips the ship gates. For claude-code, auto_mode:true writes
# permissions.defaultMode=auto to the USER settings (~/.claude/settings.json) — CC honors
# `auto` only at user scope (it ignores it in project settings). Pin `mode: bypassPermissions`
# to commit full bypass at PROJECT scope (container/VM). Set auto_mode: false for prompts.
harness:
  enabled: true
  kind: claude-code
  auto_mode: true

# ── tmux — rig-managed tmux config (generate + migrate ~/.tmux.conf) ───────────────
# OPT-IN and per-MACHINE (like auto-mode): tmux config is a developer-machine concern, so
# DECLARE IT IN THE GLOBAL CONFIG (~/.config/rig/config.yaml), not in a per-repo rig.yaml.
# Generating the config lets rig GUARANTEE ordering (continuum's status-right hook last, so
# the opt-in Moshi tweak can't wipe continuum's autosave → the stale-session-on-reboot fix).
# This block is left commented here because a CLI repo has nothing to do with tmux config;
# uncomment it in your global config to provision it. See docs/config-schema.md#tmux.
#
# tmux:
#   enabled: true
#   apply: import                  # import (preferred) | block (managed-block fallback)
#   resurrect:
#     # do NOT list `claude` while cc_restore is on — cc-restore owns the exact resume; if
#     # `claude` were here resurrect would restart it as a bare session before the hook runs.
#     processes: [ssh, psql, mysql, sqlite3]
#     capture_pane_contents: true
#   continuum: { restore: true, save_interval: 15, boot: true }
#   moshi: { enabled: true }        # opt-in; emitted BEFORE continuum init (root-cause fix)
#   cc_restore: { enabled: true }   # per-window `claude --resume <id>` after a reboot
#   anti_sprawl: { enabled: true, session: main }   # attach-or-create one canonical session
#   boot: { enabled: true }         # launchd agent brings tmux up after a macOS reboot (load -w on apply)
#   login_shell: { enabled: true }  # restored panes are login shells (~/.zprofile/PATH sourced)
